name: Build EXE

on: [push]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v3

    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Instalar Dependências
      run: pip install pandas openpyxl pyinstaller

    - name: Gerar Executável
      run: pyinstaller --onefile divisor_turmas.py

    - name: Disponibilizar para Download
      uses: actions/upload-artifact@v4
      with:
        name: DivisorTurmas_Windows
        path: dist/divisor_turmas.exe
